<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Motif — daily music theory practice, Grades 1–8, grounded in why as well as what.">
  <title>Motif: daily music theory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="appbar">
    <span class="brand"><span class="note-glyph" aria-hidden="true">♪</span> Motif <span class="brand-sub">music theory</span></span>
    <nav class="tabs" aria-label="Sections">
      <button type="button" data-tab="home" class="active">Home</button>
      <button type="button" data-tab="learn">Learn</button>
      <button type="button" data-tab="reference">Reference</button>
      <button type="button" data-tab="explore">Explainers</button>
      <button type="button" data-tab="play">Playground</button>
    </nav>
    <label class="grade-select" title="Your music theory grade">
      <span>Grade</span>
      <select id="grade-select" aria-label="Your music theory grade"></select>
    </label>
    <span class="level-chip" id="level" title="Your estimated level, from your practice here" aria-label="Estimated level">·</span>
    <span class="streak-chip" id="streak" aria-label="Current day streak">🔥 0</span>
    <div class="settings">
      <button type="button" class="icon-btn" id="settings-toggle" aria-haspopup="true" aria-expanded="false" aria-controls="settings-menu" aria-label="Settings">⚙</button>
      <div class="settings-menu" id="settings-menu" role="group" aria-label="Settings" hidden>
        <label class="menu-row sound-label">
          <span>Sound</span>
          <input type="checkbox" id="sound-toggle" checked>
        </label>
        <div class="menu-row">
          <span>Theme</span>
          <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch colour theme">🌗</button>
        </div>
      </div>
    </div>
  </header>

  <main id="main" tabindex="-1"></main>

  <footer class="note">
    Motif · music theory practice (Grades 1–8) · progress is saved in this browser only.<br>
    A personal project, shared as-is with <b>no warranty</b> - not affiliated with any exam board, not guaranteed correct. Use at your own risk.
  </footer>

  <!--
    Classic scripts (no ES modules) so the app runs over file:// with no build
    step. Each attaches its API to a single global `MTT` namespace; load order
    follows the module dependency graph. See README "Architecture".
  -->
  <script src="src/core/rng.js"></script>
  <script src="src/music.js"></script>
  <script src="src/core/validate.js"></script>
  <script src="src/core/diagnose.js"></script>
  <script src="src/notation.js"></script>
  <script src="src/audio.js"></script>
  <script src="src/core/srs.js"></script>
  <script src="src/core/analytics.js"></script>
  <script src="src/core/storage.js"></script>
  <script src="src/core/persist.js"></script>
  <script src="src/core/gist.js"></script>
  <script src="src/content.js"></script>
  <script src="src/core/session.js"></script>
  <script src="src/core/state.js"></script>
  <script src="src/ui/components.js"></script>
  <script src="src/ui/router.js"></script>
  <script src="src/ui/views/home.js"></script>
  <script src="src/ui/views/learn.js"></script>
  <script src="src/ui/views/quiz.js"></script>
  <script src="src/ui/views/explainer.js"></script>
  <script src="src/ui/views/playground.js"></script>
  <script src="src/ui/views/progress.js"></script>
  <script src="src/ui/views/reference.js"></script>
  <script src="src/ui/app.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
